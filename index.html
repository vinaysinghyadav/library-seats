<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Seat Booking</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">📚 Library Seat Booking</div>
      <div class="date-display" id="dateDisplay"></div>
    </div>
  </header>

  <main>
    <!-- Controls Bar -->
    <section class="controls-bar">
      <!-- Row 1: Slot + Date -->
      <div class="controls-row">
        <div class="control-group">
          <label for="slotSelect">Time Slot</label>
          <select id="slotSelect"></select>
        </div>
        <div class="control-group">
          <label for="fromDate">From</label>
          <input type="date" id="fromDate" />
        </div>
        <div class="control-group to-group">
          <label>To</label>
          <span id="toDisplay" class="to-display">—</span>
        </div>
      </div>
      <!-- Row 2: Pass type -->
      <div class="pass-row">
        <span class="pass-label">Pass</span>
        <button class="pass-btn active" data-pass="1d">1 Day</button>
        <button class="pass-btn" data-pass="1m">1 Month</button>
        <button class="pass-btn" data-pass="3m">3 Months</button>
        <button class="pass-btn" data-pass="6m">6 Months</button>
        <button class="pass-btn" data-pass="1y">1 Year</button>
      </div>
      <!-- Legend -->
      <div class="legend">
        <span class="dot available"></span> Available
        <span class="dot booked"></span> Booked
      </div>
    </section>

    <!-- Seat Grid -->
    <section class="seat-section">
      <div class="seat-grid" id="seatGrid"></div>
    </section>

    <!-- Stats Bar -->
    <section class="stats-bar">
      <span id="statsAvail">50 available</span>
      <span id="statsBooked">0 booked</span>
      <button class="btn-export" id="btnExport">⬇ Export to Excel</button>
    </section>
  </main>

  <!-- Booking Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <h2 id="modalTitle">Book Seat</h2>
      <p id="modalSlotLabel" class="modal-slot-label"></p>

      <!-- Book form -->
      <div id="bookForm">
        <label>Your Name
          <input type="text" id="inputName" placeholder="e.g. Vinay Singh" maxlength="40" />
        </label>
        <label>Student / Staff ID
          <input type="text" id="inputId" placeholder="e.g. LIB-2024-001" maxlength="20" />
        </label>
        <p class="error hidden" id="formError">Please fill in both fields.</p>
        <button class="btn-book" id="btnConfirm">Confirm Booking</button>
      </div>

      <!-- Already booked view -->
      <div id="bookedView" class="hidden">
        <div class="booking-card">
          <div class="booking-row"><span>Name</span><strong id="viewName"></strong></div>
          <div class="booking-row"><span>ID</span><strong id="viewId"></strong></div>
          <div class="booking-row"><span>Seat</span><strong id="viewSeat"></strong></div>
          <div class="booking-row"><span>Slot</span><strong id="viewSlot"></strong></div>
          <div class="booking-row"><span>From</span><strong id="viewFrom"></strong></div>
          <div class="booking-row"><span>To</span><strong id="viewTo"></strong></div>
        </div>
        <button class="btn-cancel" id="btnCancel">Cancel Booking</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
